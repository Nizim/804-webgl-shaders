<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Q3 - Systeme solaire etendu</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" href="css/basic.css">
  </head>
  <body>
    <div id="info"><a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> Q3: Systeme solaire etendu</div>

    <script id="post-vert" type="x-shader/x-vertex">
      // Vertex shader
      uniform float moment; // (général) temps écoulé depuis le début
      uniform float scale;  // (général) paramètre donnant le gonflement périodique
      out vec3 fn;       // (sortie) normale au sommet (repère écran)
      out vec3 vertPos;  // (sortie) coordonnées 3D du sommet (repère écran)
      out vec3 gblPos;   // (sortie) coordonnées 3D du sommet (repère général)
      void main() {
          float t = mod( moment, 6.28318530717958647688 );
          // On gonfle légèrement le soleil périodiquement en fonction du temps.
          vec3 scaled_pos = position + scale * (1.0+cos( 2.0*t)) * normal;
          gblPos = scaled_pos;
          // On calcule le vecteur normal au sommet dans le repère écran
          fn = vec3( normalMatrix * normal );
          // On calcule la position du sommet dans le repère caméra
          vec4 vertPos4 = modelViewMatrix * vec4( scaled_pos, 1.0 );
          // On envoie au fragment shader la position du sommet dans
          // le repère camera.
          vertPos = vec3(vertPos4) / vertPos4.w;
          // On indique à OpenGL la position du sommet dans le repère écran/pixel
          gl_Position = projectionMatrix * vertPos4;
      }
    </script>
    <script id="post-frag" type="x-shader/x-fragment">
      // Fragment/pixel shader
      in vec3 fn;       // (entrée) normale du pixel (repère écran) (interpolée)
      in vec3 vertPos;  // (entrée) coordonnées 3D du pixel (repère écran)(interpolées)
      in vec3 gblPos;   // (entrée) coordonnées 3D du pixel (repère général)(interpolées)
      uniform float moment; // (général) temps écoulé depuis le début
      out vec4 outColor;    // (sortie) la couleur de sortie du pixel
      void main() {
          float t = mod( moment, 6.28318530717958647688 );
          vec3 n1 = normalize(fn);
          float l = abs( n1.z );
          outColor.rgb = vec3( 1.0 , 0.6+0.4* cos( 4.*gblPos.x + 3.*t ), l );
          outColor.a = 1.0;
      }
    </script>

    <!-- Shader planete de lave (inspire du shader du soleil) -->
    <script id="lava-vert" type="x-shader/x-vertex">
      uniform float moment;
      out vec3 fn;
      out vec3 vertPos;
      out vec3 gblPos;
      void main() {
          float t = mod( moment, 6.28318530717958647688 );
          // La surface bouge un peu comme de la lave
          vec3 displaced = position + 0.02 * sin(3.0*t) * normal;
          gblPos = displaced;
          fn = vec3( normalMatrix * normal );
          vec4 vertPos4 = modelViewMatrix * vec4( displaced, 1.0 );
          vertPos = vec3(vertPos4) / vertPos4.w;
          gl_Position = projectionMatrix * vertPos4;
      }
    </script>
    <script id="lava-frag" type="x-shader/x-fragment">
      in vec3 fn;
      in vec3 vertPos;
      in vec3 gblPos;
      uniform float moment;
      out vec4 outColor;
      void main() {
          float t = mod( moment, 6.28318530717958647688 );
          vec3 n1 = normalize(fn);
          float light = max( dot(n1, normalize(-vertPos)), 0.0 );
          // Couleurs de lave qui bougent
          float r = 0.8 + 0.2 * cos( 5.0*gblPos.x + 2.0*t );
          float g = 0.3 + 0.2 * cos( 3.0*gblPos.y + 4.0*gblPos.z + t );
          float b = 0.05;
          outColor = vec4( vec3(r, g, b) * (light * 0.6 + 0.4), 1.0 );
      }
    </script>

    <script type="importmap">
      {
	  "imports": {
	      "three": "./three.module.js",
	      "three/addons/controls/": "./examples/jsm/controls/"
	  }
      }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      var renderer = null;
      var scene    = null;
      var camera   = null;
      var controls = null;
      var curTime  = Date.now();

      // Systeme solaire
      var earth      = null;
      var moon       = null;
      var earthGroup = null;
      var earthSystem = null;
      var moonGroup  = null;

      // Planetes supplementaires
      var mars      = null;
      var marsGroup = null;
      var jupiter      = null;
      var jupiterGroup = null;
      var jupiterGas   = null;
      var jupiterGas2  = null;
      var saturne      = null;
      var saturneGroup = null;
      var lava      = null;
      var lavaGroup = null;

      // Nuages terre
      var clouds = null;

      // Shaders
      var shader   = null;
      var uniforms = null;
      var lavaShader   = null;
      var lavaUniforms = null;

      init();
      run();

      // This function is called whenever the document is loaded
      function init() {

	  // Create the Three.js renderer
	  renderer = new THREE.WebGLRenderer( { antialias: true } );
	  renderer.setSize( window.innerWidth, window.innerHeight );
	  document.body.appendChild( renderer.domElement );

	  // Ombres
	  renderer.shadowMap.enabled = true;
	  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

	  // Create a new Three.js scene
	  scene = new THREE.Scene();

	  // Fond voie lactee
	  var path = "images/MilkyWay/";
	  var format = '.jpg';
	  var urls = [
	      path + 'posx' + format, path + 'negx' + format,
	      path + 'posy' + format, path + 'negy' + format,
	      path + 'posz' + format, path + 'negz' + format
	  ];
	  var textureCube = new THREE.CubeTextureLoader().load( urls );
	  textureCube.type = THREE.UnsignedByteType;
	  textureCube.format = THREE.RGBAFormat;
	  scene.background = textureCube;

	  // Add  a camera so we can view the scene
	  camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight,
						1, 4000 );
	  camera.position.set( 0, 15, 40 );

	  // Lumiere ponctuelle au centre (soleil)
	  var light = new THREE.PointLight( 0xffffff, 2.5, 0.0, 0.0 );
	  light.position.set( 0, 0, 0 );
	  // La lumiere projette des ombres
	  light.castShadow = true;
	  light.shadow.mapSize.width = 1024;
	  light.shadow.mapSize.height = 1024;
	  light.shadow.camera.near = 0.5;
	  light.shadow.camera.far = 100;
	  scene.add( light );

	  var loader = new THREE.TextureLoader();
	  var geometry = new THREE.SphereGeometry( 1, 32, 32 );

	  // Soleil
	  var sunMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
	  var sun = new THREE.Mesh( geometry, sunMat );
	  sun.scale.set( 1.5, 1.5, 1.5 );
	  sun.castShadow = false;
	  sun.receiveShadow = false;
	  scene.add( sun );

	  // Halo du soleil (shader du sujet)
	  uniforms = {
	      moment: { value: 0.0 },
	      scale:  { value: 0.02 }
	  };
	  shader = new THREE.ShaderMaterial( {
	      vertexShader:   document.querySelector( '#post-vert' ).textContent.trim(),
	      fragmentShader: document.querySelector( '#post-frag' ).textContent.trim(),
	      uniforms: uniforms
	  } );
	  shader.glslVersion = THREE.GLSL3;
	  var sunHalo = new THREE.Mesh( geometry, shader );
	  sunHalo.scale.set( 1.5, 1.5, 1.5 );
	  sunHalo.castShadow = false;
	  sunHalo.receiveShadow = false;
	  scene.add( sunHalo );

	  // --- Terre ---
	  earthGroup = new THREE.Group();
	  scene.add( earthGroup );
	  earthSystem = new THREE.Group();
	  earthSystem.position.x = 8;
	  earthGroup.add( earthSystem );

	  var earthMat = new THREE.MeshPhongMaterial({
	      map: loader.load( "images/earth_atmos_2048.jpg" ),
	      specular: new THREE.Color( 0xffffff ),
	      shininess: 30
	  });
	  earth = new THREE.Mesh( geometry, earthMat );
	  earth.rotation.x = Math.PI / 5;
	  earth.castShadow = true;
	  earth.receiveShadow = true;
	  earthSystem.add( earth );

	  // Nuages (couche transparente par dessus la terre)
	  var cloudsMat = new THREE.MeshPhongMaterial({
	      map: loader.load( "images/earth_clouds_2048.png" ),
	      transparent: true,
	      opacity: 0.85,
	      depthWrite: false
	  });
	  clouds = new THREE.Mesh( geometry, cloudsMat );
	  clouds.scale.set( 1.05, 1.05, 1.05 );
	  earth.add( clouds );

	  // Lune
	  moonGroup = new THREE.Group();
	  earthSystem.add( moonGroup );
	  var moonMat = new THREE.MeshPhongMaterial({
	      map: loader.load( "images/moon_1024.jpg" )
	  });
	  moon = new THREE.Mesh( geometry, moonMat );
	  moon.scale.set( 0.27, 0.27, 0.27 );
	  moon.position.x = 2;
	  moon.castShadow = true;
	  moon.receiveShadow = true;
	  moonGroup.add( moon );

	  // --- Mars (sphere rouge) ---
	  marsGroup = new THREE.Group();
	  marsGroup.rotation.y = Math.PI * 0.7; // angle initial
	  scene.add( marsGroup );
	  var marsSystem = new THREE.Group();
	  marsSystem.position.x = 13;
	  marsGroup.add( marsSystem );

	  var marsMat = new THREE.MeshPhongMaterial({
	      color: 0xcc4422,
	      shininess: 10
	  });
	  mars = new THREE.Mesh( geometry, marsMat );
	  mars.scale.set( 0.53, 0.53, 0.53 );
	  mars.castShadow = true;
	  mars.receiveShadow = true;
	  marsSystem.add( mars );

	  // --- Jupiter (grosse sphere beige/orange) ---
	  jupiterGroup = new THREE.Group();
	  jupiterGroup.rotation.y = Math.PI * 1.4; // angle initial
	  scene.add( jupiterGroup );
	  var jupiterSystem = new THREE.Group();
	  jupiterSystem.position.x = 20;
	  jupiterGroup.add( jupiterSystem );

	  var jupiterMat = new THREE.MeshPhongMaterial({
	      color: 0xddaa66,
	      shininess: 15
	  });
	  jupiter = new THREE.Mesh( geometry, jupiterMat );
	  jupiter.scale.set( 2.0, 2.0, 2.0 );
	  jupiter.castShadow = true;
	  jupiter.receiveShadow = true;
	  jupiterSystem.add( jupiter );

	  // Couche de gaz autour de Jupiter
	  var jupiterGasMat = new THREE.MeshPhongMaterial({
	      color: 0xcc8844,
	      transparent: true,
	      opacity: 0.5,
	      depthWrite: false
	  });
	  var jupiterGas = new THREE.Mesh( geometry, jupiterGasMat );
	  jupiterGas.scale.set( 1.08, 1.08, 1.08 );
	  jupiter.add( jupiterGas );

	  var jupiterGas2 = new THREE.Mesh( geometry, new THREE.MeshPhongMaterial({
	      color: 0xaa6633,
	      transparent: true,
	      opacity: 0.3,
	      depthWrite: false
	  }) );
	  jupiterGas2.scale.set( 1.15, 1.15, 1.15 );
	  jupiter.add( jupiterGas2 );

	  // --- Saturne + anneaux ---
	  saturneGroup = new THREE.Group();
	  saturneGroup.rotation.y = Math.PI * 0.3; // angle initial
	  scene.add( saturneGroup );
	  var saturneSystem = new THREE.Group();
	  saturneSystem.position.x = 30;
	  saturneGroup.add( saturneSystem );

	  var saturneMat = new THREE.MeshPhongMaterial({
	      color: 0xddcc88,
	      shininess: 15
	  });
	  saturne = new THREE.Mesh( geometry, saturneMat );
	  saturne.scale.set( 1.7, 1.7, 1.7 );
	  saturne.castShadow = true;
	  saturne.receiveShadow = true;
	  saturneSystem.add( saturne );

	  // Anneaux (visuel plat)
	  var ringGeo = new THREE.RingGeometry( 2.2, 3.8, 64 );
	  var ringMat = new THREE.MeshBasicMaterial({
	      color: 0xccbb88,
	      side: THREE.DoubleSide,
	      transparent: true,
	      opacity: 0.6
	  });
	  var ring = new THREE.Mesh( ringGeo, ringMat );
	  ring.rotation.x = -Math.PI / 2.5;
	  saturne.add( ring );

	  // Tore invisible juste pour projeter l'ombre de l'anneau
	  var shadowRingGeo = new THREE.TorusGeometry( 3.0, 0.05, 8, 64 );
	  var shadowRingMat = new THREE.MeshPhongMaterial({ opacity: 0.01, transparent: true });
	  var shadowRing = new THREE.Mesh( shadowRingGeo, shadowRingMat );
	  shadowRing.rotation.x = ring.rotation.x;
	  shadowRing.castShadow = true;
	  saturne.add( shadowRing );

	  // --- Planete de lave (shader custom) ---
	  lavaGroup = new THREE.Group();
	  lavaGroup.rotation.y = Math.PI * 1.1; // angle initial
	  scene.add( lavaGroup );
	  var lavaSystem = new THREE.Group();
	  lavaSystem.position.x = 5;
	  lavaGroup.add( lavaSystem );

	  lavaUniforms = { moment: { value: 0.0 } };
	  lavaShader = new THREE.ShaderMaterial({
	      vertexShader:   document.getElementById( 'lava-vert' ).textContent.trim(),
	      fragmentShader: document.getElementById( 'lava-frag' ).textContent.trim(),
	      uniforms: lavaUniforms
	  });
	  lavaShader.glslVersion = THREE.GLSL3;
	  lava = new THREE.Mesh( geometry, lavaShader );
	  lava.scale.set( 0.4, 0.4, 0.4 );
	  lavaSystem.add( lava );

	  // Controle camera a la souris
	  controls = new OrbitControls( camera, renderer.domElement );
	  controls.enableDamping = true;
	  controls.dampingFactor = 0.25;
	  controls.minDistance = 3;
	  controls.maxDistance = 80;

	  // Redimensionnement fenetre
	  window.addEventListener( 'resize', function() {
	      camera.aspect = window.innerWidth / window.innerHeight;
	      camera.updateProjectionMatrix();
	      renderer.setSize( window.innerWidth, window.innerHeight );
	  });
      }

      // This function is called regularly to update the canvas webgl.
      function run() {
	  // Ask to call again run
	  requestAnimationFrame( run );

	  // Render the scene
	  render();

	  // Calls the animate function if objects or camera should move
	  animate();
      }

      // This function is called regularly to take care of the rendering.
      function render() {
	  // Render the scene
	  renderer.render( scene, camera );
      }

      // This function is called regularly to update objects.
      function animate() {
	  // Computes how time has changed since last display
	  var now       = Date.now();
	  var deltaTime = now - curTime;
	  curTime       = now;
	  var fracTime  = deltaTime / 1000; // in seconds

	  var angle = fracTime * Math.PI * 2;

	  // On ralentit tout pour que ce soit agreable a regarder
	  var slow = angle * 0.1;

	  // Terre
	  earthGroup.rotation.y += slow / 365;
	  earth.rotation.y      += angle;
	  moonGroup.rotation.y  += slow / 28;
	  moon.rotation.y       += slow / 28;
	  // Les nuages tournent un peu plus vite que la terre
	  clouds.rotation.y += slow * 1.2;

	  // Mars
	  marsGroup.rotation.y  += slow / 687;
	  mars.rotation.y       += slow / 1.03;

	  // Jupiter
	  jupiterGroup.rotation.y += slow / 4333;
	  jupiter.rotation.y      += slow / 0.41;
	  jupiterGas.rotation.y  += slow * 0.3;
	  jupiterGas2.rotation.y -= slow * 0.2;

	  // Saturne
	  saturneGroup.rotation.y += slow / 10759;
	  saturne.rotation.y      += slow / 0.15;

	  // Planete de lave (orbite proche du soleil, tourne vite)
	  lavaGroup.rotation.y += slow / 50;
	  lava.rotation.y      += slow / 0.5;

	  // Shaders
	  shader.uniforms.moment.value += fracTime;
	  lavaShader.uniforms.moment.value += fracTime;

	  controls.update();
      }

    </script>

  </body>
</html>
